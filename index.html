<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- PWA Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My Voice" />
    <link rel="apple-touch-icon" href="/icon-180.png" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="Do zero à conversação real. Inglês para o seu dia a dia, trabalho e viagem." />
    <meta property="og:title" content="My Voice – Inglês do Zero" />
    <meta property="og:description" content="Do zero à conversação real. Inglês para o seu dia a dia, trabalho e viagem." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/hero.png" />

    <!-- App Download Links -->
    <link rel="alternate" href="https://seu-dominio.com/download/ios" hreflang="x-default" />
    <meta name="apple-itunes-app" content="app-id=seu-app-id, app-argument=https://seu-dominio.com" />

    <!-- Manifest Link -->
    <link rel="manifest" href="/manifest.json" />

    <title>My Voice</title>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.warn('SW falhou:', err));
        });
      }
    </script>
</body>
</html>
