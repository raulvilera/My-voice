<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/my_voice_default_v4.png" />

    <!-- PWA Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1e36" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My Voice" />
    <link rel="apple-touch-icon" href="/my_voice_default_v4.png" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="Do zero à conversação real. Inglês para o seu dia a dia, trabalho e viagem." />
    <meta property="og:title" content="My Voice – Inglês do Zero" />
    <meta property="og:description" content="Do zero à conversação real. Inglês para o seu dia a dia, trabalho e viagem." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/my_voice_default_v4.png" />

    <!-- App Download Links (PWA Install) -->
    <!-- O botão de instalação é gerenciado dinamicamente via JavaScript -->

    <!-- Manifest Link -->
    <link rel="manifest" href="/manifest.json" />

    <title>My Voice</title>

    <!-- Bloqueia a Vercel Toolbar antes de qualquer renderização -->
    <script>
      (function () {
        // Remove o elemento vercel-toolbar e scripts relacionados assim que aparecerem no DOM
        const TOOLBAR_TAGS = ['vercel-toolbar', 'vercel-live-feedback'];
        const TOOLBAR_SCRIPT_PATTERN = /_vercel\/toolbar|vercel-toolbar|vercel-live/i;

        function removeToolbar(node) {
          if (!node || !node.tagName) return;
          const tag = node.tagName.toLowerCase();
          if (TOOLBAR_TAGS.includes(tag)) {
            node.remove();
            return;
          }
          // Remove scripts da toolbar
          if (tag === 'script') {
            const src = node.src || '';
            if (TOOLBAR_SCRIPT_PATTERN.test(src)) {
              node.remove();
            }
          }
        }

        // Observer para capturar elementos injetados dinamicamente
        const observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (mutation) {
            mutation.addedNodes.forEach(removeToolbar);
          });
        });

        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
        });

        // Tenta remover o que já estiver no DOM
        document.addEventListener('DOMContentLoaded', function () {
          TOOLBAR_TAGS.forEach(function (tag) {
            document.querySelectorAll(tag).forEach(function (el) { el.remove(); });
          });
          document.querySelectorAll('script').forEach(function (el) {
            if (TOOLBAR_SCRIPT_PATTERN.test(el.src)) el.remove();
          });
        });
      })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
    <script>
      // Registra o Service Worker para funcionalidade PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.warn('SW falhou:', err));
        });
      }

      // Captura o evento de instalação do PWA
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('PWA pronto para instalação');
      });

      window.addEventListener('appinstalled', () => {
        console.log('PWA instalado com sucesso');
        deferredPrompt = null;
      });
    </script>
</body>
</html>
